spring.application.name=pos-backend
server.port=${PORT:8080}

# Database configuration using environment variables.
# DB_URL/DB_USERNAME default to a typical local MySQL setup for convenience.
# DB_PASSWORD has NO default and MUST be supplied via an environment variable or .env file.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/restaurant_pos?useSSL=false}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

# Production Safety Settings
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# App Custom Security Properties.
# These have NO default values on purpose - they must always be supplied via
# environment variables (see application-example.properties / README).
app.jwt.secret=${JWT_SECRET}
app.default.admin.username=${ADMIN_USERNAME}
app.default.admin.password=${ADMIN_PASSWORD}
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}