# ============================================================
# EXAMPLE ENVIRONMENT CONFIGURATION
# ------------------------------------------------------------
# Copy this file to a real ".env" file (or export these as real
# environment variables / system properties) before running the
# backend. DO NOT commit a file containing real secrets.
#
# Usage:
#   1. Create a ".env" file in pos-backend/ (already gitignored)
#      or export these as OS environment variables.
#   2. Fill in real values below - never reuse the values from
#      this example file in a real deployment.
# ============================================================

# ---- Database ----
DB_URL=jdbc:mysql://localhost:3306/restaurant_pos?useSSL=false
DB_USERNAME=
DB_PASSWORD=

# ---- Security ----
# Must be a long, random string (32+ characters).
# Generate one with, e.g.: openssl rand -base64 48
JWT_SECRET=

# ---- Default Admin Account ----
# Created automatically on first startup if it does not already exist.
ADMIN_USERNAME=
ADMIN_PASSWORD=

# ---- CORS ----
# Comma-separated list of origins allowed to call the API / connect via WebSocket.
ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5174

# ---- Server ----
PORT=8080
